<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Weather Center</title>
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">LIVE WEATHER CENTER</div>

    <form id="searchForm" class="search">
      <input id="searchInput" placeholder="Search city, ZIP, or K-code" />
      <button type="submit">Search</button>
    </form>

    <button id="themeToggle" class="theme-btn">Dark Mode</button>
  </header>

  <main class="dashboard">
    <section class="hero-card">
      <div>
        <img id="currentIcon" class="current-icon" src="" alt="Weather icon" />
        <h1 id="locationName">Loading...</h1>
        <p id="conditionText">Current Conditions</p>
      </div>
      <div id="currentTemp" class="big-temp">--°</div>
    </section>

    <section class="grid-4">
      <div class="card"><h2>High</h2><p id="highTemp">--°</p></div>
      <div class="card"><h2>Low</h2><p id="lowTemp">--°</p></div>
      <div class="card"><h2>Feels Like</h2><p id="feelsLike">--°</p></div>
      <div class="card"><h2>Humidity</h2><p id="humidity">--%</p></div>
    </section>

    <section class="card alert-card">
      <h2>Current Alerts</h2>
      <div id="alertsBox">Checking...</div>
    </section>

    <section class="card">
      <h2>Hourly Forecast</h2>
      <div id="hourlyList" class="hourly-list"></div>
    </section>

    <section class="card">
      <h2>Daily Forecast</h2>
      <div id="dailyList" class="daily-list"></div>
    </section>

    <section class="grid-3">
      <div class="card"><h2 id="sunTitle">Sunrise</h2><p id="sunTime">--</p></div>
      <div class="card"><h2>Pressure</h2><p id="pressure">-- mb</p></div>
      <div class="card"><h2>UV Index</h2><p id="uvIndex">--</p></div>
    </section>

    <p id="updatedText" class="updated">Updating weather data...</p>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
